<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 580" width="420" height="580">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="rgba(15,23,42,0.92)"/>
    </linearGradient>
    <linearGradient id="cta-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="page-bg" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="card-shadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#38bdf8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="580" rx="20" fill="url(#page-bg)"/>

  <!-- Card -->
  <g filter="url(#card-shadow)">
    <rect x="50" y="30" width="320" height="490" rx="24" fill="url(#card-bg)" stroke="rgba(148,163,184,0.18)" stroke-width="1"/>
  </g>

  <!-- Popular glow ring -->
  <rect x="48" y="28" width="324" height="494" rx="26" fill="none" stroke="rgba(56,189,248,0.35)" stroke-width="2" filter="url(#glow)"/>

  <!-- Popular Badge -->
  <rect x="140" y="50" width="140" height="28" rx="14" fill="url(#cta-bg)"/>
  <text x="210" y="68" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">⭐ MOST POPULAR</text>

  <!-- Tier Name -->
  <text x="210" y="110" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#38bdf8" text-anchor="middle" letter-spacing="1.5">PRO</text>

  <!-- Price Block -->
  <text x="160" y="168" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700" fill="#94a3b8" text-anchor="end">$</text>
  <text x="210" y="175" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="800" fill="#f1f5f9" text-anchor="middle">29</text>
  <text x="262" y="168" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="500" fill="#94a3b8" text-anchor="start">/mo</text>

  <!-- Billing Toggle -->
  <text x="132" y="215" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94a3b8" text-anchor="end">Monthly</text>
  <!-- Toggle track -->
  <rect x="140" y="202" width="44" height="24" rx="12" fill="rgba(148,163,184,0.2)"/>
  <!-- Toggle knob -->
  <circle cx="154" cy="214" r="10" fill="#ffffff"/>
  <text x="195" y="215" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94a3b8" text-anchor="start">Yearly</text>
  <!-- Save badge -->
  <rect x="235" y="205" width="60" height="18" rx="4" fill="rgba(34,197,94,0.2)"/>
  <text x="265" y="217" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700" fill="#22c55e" text-anchor="middle">Save 20%</text>

  <!-- Features -->
  <line x1="80" y1="240" x2="340" y2="240" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
  <text x="95" y="268" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">✓  Unlimited projects</text>
  <text x="95" y="292" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">✓  Priority support</text>
  <text x="95" y="316" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">✓  Advanced analytics</text>
  <text x="95" y="340" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">✓  Team collaboration</text>
  <text x="95" y="364" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#94a3b8">✓  Custom integrations</text>
  <line x1="80" y1="382" x2="340" y2="382" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>

  <!-- CTA Button -->
  <rect x="76" y="398" width="268" height="48" rx="14" fill="url(#cta-bg)"/>
  <text x="210" y="427" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Start free trial</text>

  <!-- Urgency Timer -->
  <text x="210" y="475" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#fb923c" text-anchor="middle">⏰ Offer ends in 00:59:42</text>

  <!-- Tier Variant Pills -->
  <rect x="72" y="530" width="78" height="24" rx="12" fill="rgba(167,139,250,0.15)"/>
  <text x="111" y="546" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle">Starter</text>

  <rect x="160" y="530" width="56" height="24" rx="12" fill="rgba(56,189,248,0.15)"/>
  <text x="188" y="546" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#38bdf8" text-anchor="middle">Pro</text>

  <rect x="226" y="530" width="90" height="24" rx="12" fill="rgba(245,158,11,0.15)"/>
  <text x="271" y="546" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">Enterprise</text>

  <!-- Caption -->
  <text x="210" y="570" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.5">ui-pricing-card · tier variants · billing toggle · urgency timer</text>
</svg>
