<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 480" width="420" height="480">
  <defs>
    <linearGradient id="avatar-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="avatar-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.6"/>
    </filter>
    <filter id="tooltip-shadow" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="avatar-clip">
      <circle cx="210" cy="220" r="56"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="420" height="480" rx="20" fill="url(#bg-grad)"/>

  <!-- Tooltip -->
  <g filter="url(#tooltip-shadow)">
    <rect x="72" y="110" width="276" height="36" rx="18" fill="#1e293b" stroke="rgba(148,163,184,0.18)" stroke-width="1"/>
  </g>
  <text x="210" y="133" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#f1f5f9" text-anchor="middle" font-weight="500">Ana Petrović · Frontend Lead · Available</text>

  <!-- Tooltip arrow -->
  <polygon points="210,148 202,158 218,158" fill="#1e293b"/>

  <!-- Avatar circle -->
  <circle cx="210" cy="220" r="56" fill="url(#avatar-grad)" filter="url(#avatar-shadow)"/>
  <circle cx="210" cy="220" r="56" fill="none" stroke="rgba(148,163,184,0.2)" stroke-width="2"/>

  <!-- Initials -->
  <text x="210" y="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">AP</text>

  <!-- Status badge: online (green) -->
  <circle cx="252" cy="258" r="10" fill="#1e293b"/>
  <circle cx="252" cy="258" r="8" fill="#22c55e"/>

  <!-- Username -->
  <text x="210" y="306" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">Ana Petrović</text>

  <!-- Role -->
  <text x="210" y="328" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#94a3b8" text-anchor="middle" letter-spacing="1.2">FRONTEND LEAD</text>

  <!-- Divider -->
  <line x1="110" y1="358" x2="310" y2="358" stroke="rgba(148,163,184,0.14)" stroke-width="1"/>

  <!-- Status variant pills -->
  <!-- online -->
  <rect x="68" y="374" width="66" height="26" rx="13" fill="#166534"/>
  <circle cx="86" cy="387" r="5" fill="#22c55e"/>
  <text x="104" y="391" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e" text-anchor="middle">online</text>

  <!-- idle -->
  <rect x="144" y="374" width="52" height="26" rx="13" fill="#713f12"/>
  <circle cx="160" cy="387" r="5" fill="#facc15"/>
  <text x="178" y="391" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#facc15" text-anchor="middle">idle</text>

  <!-- away -->
  <rect x="206" y="374" width="56" height="26" rx="13" fill="#7c2d12"/>
  <circle cx="222" cy="387" r="5" fill="#fb923c"/>
  <text x="242" y="391" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fb923c" text-anchor="middle">away</text>

  <!-- offline -->
  <rect x="272" y="374" width="68" height="26" rx="13" fill="#1e293b" stroke="rgba(148,163,184,0.2)" stroke-width="1"/>
  <circle cx="288" cy="387" r="5" fill="#64748b"/>
  <text x="312" y="391" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">offline</text>

  <!-- Caption -->
  <text x="210" y="450" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle" letter-spacing="0.5">ui-user-avatar · status variants · slot API · profile event</text>
</svg>
